<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>提现到微信</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #f5f5f5;
            color: #333;
            -webkit-font-smoothing: antialiased;
        }
        
        /* 顶部状态栏模拟 */
        .status-bar {
            background-color: #07c160;
            height: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 12px;
            color: white;
            font-size: 12px;
            font-weight: 600;
        }
        
        .status-bar .time {
            font-size: 14px;
        }
        
        .status-bar .icons {
            display: flex;
            gap: 4px;
            align-items: center;
        }
        
        /* 导航栏 */
        .nav-bar {
            background-color: #07c160;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            color: white;
            font-size: 17px;
            font-weight: 600;
        }
        
        .nav-bar .back {
            position: absolute;
            left: 12px;
            font-size: 20px;
        }
        
        /* 主内容区 */
        .content {
            padding: 0 16px;
        }
        
        /* 提现至 */
        .withdraw-to {
            background-color: white;
            margin-top: 12px;
            padding: 16px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 15px;
            color: #666;
        }
        
        .wechat-icon {
            width: 20px;
            height: 20px;
            background-color: #07c160;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 12px;
        }
        
        .account-name {
            color: #999;
            font-size: 14px;
        }
        
        /* 待提现金额 */
        .amount-section {
            background-color: white;
            margin-top: 12px;
            padding: 20px 16px;
            border-radius: 8px;
        }
        
        .amount-label {
            font-size: 14px;
            color: #666;
            margin-bottom: 8px;
        }
        
        .amount-value {
            font-size: 36px;
            font-weight: 700;
            color: #333;
            display: flex;
            align-items: flex-start;
        }
        
        .amount-value .currency {
            font-size: 24px;
            margin-right: 2px;
            margin-top: 4px;
        }
        
        /* 详情信息 */
        .details {
            margin-top: 20px;
            padding-top: 16px;
            border-top: 1px solid #f0f0f0;
        }
        
        .detail-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-size: 14px;
        }
        
        .detail-row:last-child {
            margin-bottom: 0;
        }
        
        .detail-label {
            color: #999;
        }
        
        .detail-value {
            color: #333;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        .detail-value.success {
            color: #07c160;
        }
        
        .detail-value.pending {
            color: #ff5722;
        }
        
        .check-icon {
            color: #07c160;
            font-size: 14px;
        }
        
        /* 奖励通知卡片 */
        .reward-card {
            background-color: white;
            margin-top: 12px;
            border-radius: 8px;
            overflow: hidden;
        }
        
        .reward-header {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 16px;
            border-bottom: 1px solid #f5f5f5;
        }
        
        .pdd-logo {
            width: 24px;
            height: 24px;
            background: linear-gradient(135deg, #ff4757 0%, #ff6348 100%);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 12px;
            font-weight: bold;
        }
        
        .reward-title {
            font-size: 14px;
            color: #333;
            font-weight: 500;
        }
        
        .reward-body {
            padding: 20px 16px;
            text-align: center;
        }
        
        .reward-label {
            font-size: 14px;
            color: #666;
            margin-bottom: 8px;
        }
        
        .reward-amount {
            font-size: 32px;
            font-weight: 700;
            color: #333;
            display: flex;
            align-items: flex-start;
            justify-content: center;
        }
        
        .reward-amount .currency {
            font-size: 20px;
            margin-right: 2px;
            margin-top: 4px;
        }
        
        .reward-info {
            margin-top: 20px;
            text-align: left;
        }
        
        .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 13px;
        }
        
        .info-row:last-child {
            margin-bottom: 0;
        }
        
        .info-label {
            color: #999;
        }
        
        .info-value {
            color: #666;
        }
        
        /* 底部提示 */
        .footer-tip {
            text-align: center;
            margin-top: 40px;
            color: #999;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <!-- 状态栏 -->
    <div class="status-bar">
        <span class="time">11:38</span>
        <div class="icons">
            <span>5G</span>
            <span>🔋</span>
        </div>
    </div>
    
    <!-- 导航栏 -->
    <div class="nav-bar">
        <span class="back">‹</span>
        <span>提现到微信</span>
    </div>
    
    <!-- 内容区 -->
    <div class="content">
        <!-- 提现至 -->
        <div class="withdraw-to">
            <span>提现至：</span>
            <div class="wechat-icon">微</div>
            <span>微信</span>
            <span class="account-name">（账户：owe...）</span>
        </div>
        
        <!-- 待提现金额 -->
        <div class="amount-section">
            <div class="amount-label">待提现金额</div>
            <div class="amount-value">
                <span class="currency">¥</span>
                <span>25</span>
            </div>
            
            <div class="details">
                <div class="detail-row">
                    <span class="detail-label">创建时间</span>
                    <span class="detail-value">2026-03-10 11:38:19</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">打款方式</span>
                    <span class="detail-value success">
                        <span class="check-icon">✓</span>
                        微信打款
                    </span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">已获得金额</span>
                    <span class="detail-value pending">25元</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">待获得金额</span>
                    <span class="detail-value pending">25元</span>
                </div>
            </div>
        </div>
        
        <!-- 奖励通知 -->
        <div class="reward-card">
            <div class="reward-header">
                <div class="pdd-logo">拼</div>
                <span class="reward-title">奖励通知-来自现金大转盘</span>
            </div>
            <div class="reward-body">
                <div class="reward-label">奖励金额</div>
                <div class="reward-amount">
                    <span class="currency">¥</span>
                    <span>25</span>
                </div>
                
                <div class="reward-info">
                    <div class="info-row">
                        <span class="info-label">收款账户</span>
                        <span class="info-value">owen</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">转账备注</span>
                        <span class="info-value">来自现金大转盘</span>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 底部提示 -->
        <div class="footer-tip">
            累满50元即可全部提现
        </div>
    </div>
</body>
</html>
